  - type: custom:plotly-graph
    title: Battery Usage vs Spot Price
    raw_plotly_config: true
    hours_to_show: 48
    refresh_interval: 30
    defaults:
      entity:
        period: 5minute
    config:
      displayModeBar: false
    entities:
      - entity: sensor.spot_price
        internal: true
        fn: |
          $ex {
            try {
              vars.charging_color = 'rgba(220, 70, 255, 0.95)';
              vars.discharging_color = 'rgba(0, 200, 255, 0.95)';
              
              const SLOT_MS = 15 * 60 * 1000;
              const SLOTS_PER_ROW = 24;
              const ROWS = 8;
              const TOTAL_SLOTS = SLOTS_PER_ROW * ROWS;

              const toMs = (v) => {
                const t = new Date(v).getTime();
                return Number.isFinite(t) ? t : null;
              };

              const helsinki = (ts, opts = {}) =>
                new Intl.DateTimeFormat(
                  hass?.locale?.language || 'en-GB',
                  {
                    timeZone: 'Europe/Helsinki',
                    hour12: false,
                    ...opts
                  }
                ).format(new Date(ts));

              const points = (xs || [])
                .map((x, i) => [toMs(x), Number(ys?.[i])])
                .filter(([t, v]) => Number.isFinite(t) && Number.isFinite(v))
                .sort((a, b) => a[0] - b[0]);

              if (!points.length) {
                vars.hm = null;
                return;
              }

              const nowMs = Date.now();
              const endSlot = Math.floor(nowMs / (15 * 60 * 1000)) * (15 * 60 * 1000);
              const startSlot = endSlot - (TOTAL_SLOTS - 1) * SLOT_MS;

              const bands = [
                { min: -Infinity, max: 0,  color: 'cyan',       label: '≤ 0 ¢' },
                { min: 0,         max: 5,  color: 'lime',       label: '0–5 ¢' },
                { min: 5,         max: 10, color: 'limegreen',  label: '5–10 ¢' },
                { min: 10,        max: 15, color: 'gold',       label: '10–15 ¢' },
                { min: 15,        max: 20, color: 'darkorange', label: '15–20 ¢' },
                { min: 20,        max: 30, color: 'red',        label: '20–30 ¢' },
                { min: 30,        max: Infinity, color: 'darkred', label: '> 30 ¢' }
              ];

              const bandIndexFor = (price) => {
                if (!Number.isFinite(price)) return null;
                for (let i = 0; i < bands.length; i++) {
                  if (price > bands[i].min && price <= bands[i].max) return i;
                  if (price === 0 && i === 0) return i;
                }
                return bands.length - 1;
              };

              const epsilon = 1 / (bands.length * 200);
              const colorscale = [];
              for (let i = 0; i < bands.length; i++) {
                const s = i / bands.length;
                const e = (i + 1) / bands.length;
                colorscale.push([s, bands[i].color]);
                colorscale.push([Math.max(s, e - epsilon), bands[i].color]);
                if (i === bands.length - 1) colorscale.push([1, bands[i].color]);
              }

              const slotValues = new Array(TOTAL_SLOTS).fill(null);
              let p = 0;
              let last = null;
              for (let i = 0; i < TOTAL_SLOTS; i++) {
                const slotTime = startSlot + i * SLOT_MS;
                while (p < points.length && points[p][0] <= slotTime) {
                  last = points[p][1];
                  p++;
                }
                slotValues[i] = Number.isFinite(last) ? last : null;
              }

              const x = Array.from({ length: SLOTS_PER_ROW }, (_, i) => i);
              const y = [];
              const yText = [];
              const z = [];
              const text = [];

              for (let row = 0; row < ROWS; row++) {
                const rowZ = [];
                const rowText = [];
                const rowStart = startSlot + row * SLOTS_PER_ROW * SLOT_MS;
                const rowEnd = rowStart + SLOTS_PER_ROW * SLOT_MS;

                y.push(row);
                yText.push(
                  `${helsinki(rowStart, { weekday: 'short', day: '2-digit', month: '2-digit', hour: '2-digit', minute: '2-digit' })} – ${helsinki(rowEnd, { hour: '2-digit', minute: '2-digit' })}`
                );

                for (let i = 0; i < SLOTS_PER_ROW; i++) {
                  const idx = row * SLOTS_PER_ROW + i;
                  const slotTime = startSlot + idx * SLOT_MS;
                  const price = slotValues[idx];

                  rowZ.push(bandIndexFor(price));
                  rowText.push(
                    Number.isFinite(price)
                      ? `${helsinki(slotTime, { weekday: 'short', day: '2-digit', month: '2-digit', hour: '2-digit', minute: '2-digit' })}<br>${price.toFixed(3)} c/kWh`
                      : `${helsinki(slotTime, { weekday: 'short', day: '2-digit', month: '2-digit', hour: '2-digit', minute: '2-digit' })}<br>No data`
                  );
                }

                z.push(rowZ);
                text.push(rowText);
              }

              vars.hm = {
                x,
                y,
                z,
                text,
                yText,
                colorscale,
                bandTicks: bands.map((_, i) => i),
                bandText: bands.map(b => b.label),
                startSlot
              };
            } catch (err) {
              console.error('[Spot heatmap] exception', err);
              vars.hm = null;
            }
          }
      - entity: sensor.battery_consumption
        internal: true
        fn: |
          $ex {
            try {
              const SLOT_MS = 15 * 60 * 1000;
              const SLOTS_PER_ROW = 24;
              const ROWS = 8;
              const TOTAL_SLOTS = SLOTS_PER_ROW * ROWS;
              const startSlot = vars.hm?.startSlot;

              if (!Number.isFinite(startSlot)) {
                vars.charge = null;
                return;
              }

              const toMs = (v) => {
                const t = new Date(v).getTime();
                return Number.isFinite(t) ? t : null;
              };

              const points = (xs || [])
                .map((x, i) => [toMs(x), Number(ys?.[i])])
                .filter(([t, v]) => Number.isFinite(t) && Number.isFinite(v))
                .sort((a, b) => a[0] - b[0]);

              const slotValues = new Array(TOTAL_SLOTS).fill(null);
              let p = 0;
              let last = null;
              for (let i = 0; i < TOTAL_SLOTS; i++) {
                const slotTime = startSlot + i * SLOT_MS;
                while (p < points.length && points[p][0] <= slotTime) {
                  last = points[p][1];
                  p++;
                }
                slotValues[i] = Number.isFinite(last) ? last : null;
              }

              const z = [];
              const threshold = 0.05;
              for (let row = 0; row < ROWS; row++) {
                const rowZ = [];
                for (let i = 0; i < SLOTS_PER_ROW; i++) {
                  const idx = row * SLOTS_PER_ROW + i;
                  rowZ.push((slotValues[idx] || 0) > threshold ? 1 : null);
                }
                z.push(rowZ);
              }

              vars.charge = z;
            } catch (err) {
              console.error('[Charge mask] exception', err);
              vars.charge = null;
            }
          }
