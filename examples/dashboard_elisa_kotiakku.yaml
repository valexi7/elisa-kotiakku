title: Elisa Kotiakku
path: kotiakku
icon: mdi:battery-charging-medium
type: masonry
cards:
  - type: heading
    heading: Battery & Solar
  - square: false
    type: grid
    columns: 1
    cards:
      - type: custom:power-flow-card-plus
        title: Live Power Flow
        entities:
          solar:
            entity: sensor.solar_power
          battery:
            entity:
              consumption: sensor.battery_production
              production: sensor.battery_consumption
            state_of_charge: sensor.battery_state_of_charge
            invert_state: false
          grid:
            entity:
              consumption: sensor.grid_consumption
              production: sensor.grid_production
          home:
            entity: sensor.house_power
          individual:
            - entity: sensor.charger_power_active_import
              secondary_info: {}
              name: EV Charging
        clickable_entities: true
        w_decimals: 0
        kw_decimals: 2
        min_flow_rate: 2
        max_flow_rate: 5
        display_zero_lines: true
      - type: custom:mushroom-template-card
        entity: sensor.battery_state_of_charge
        primary: Battery
        secondary: >
          SoC: {{ states('sensor.battery_state_of_charge') }} % • {{
          states('sensor.battery_temperature') }} °C • {{
            'Charging' if (states('sensor.grid_to_battery')|float(0) + states('sensor.solar_to_battery')|float(0)) >
                          (states('sensor.battery_to_house')|float(0) + states('sensor.battery_to_grid')|float(0))
            else 'Discharging' if (states('sensor.battery_to_house')|float(0) + states('sensor.battery_to_grid')|float(0)) >
                                 (states('sensor.grid_to_battery')|float(0) + states('sensor.solar_to_battery')|float(0))
            else 'Idle'
          }}
        icon: >
          {% set soc = states('sensor.battery_state_of_charge')|float(0) %} {%
          if soc >= 95 %} mdi:battery {% elif soc >= 85 %} mdi:battery-90 {%
          elif soc >= 75 %} mdi:battery-80 {% elif soc >= 65 %} mdi:battery-70
          {% elif soc >= 55 %} mdi:battery-60 {% elif soc >= 45 %}
          mdi:battery-50 {% elif soc >= 35 %} mdi:battery-40 {% elif soc >= 25
          %} mdi:battery-30 {% elif soc >= 15 %} mdi:battery-20 {% elif soc > 5
          %}  mdi:battery-10 {% else %} mdi:battery-alert {% endif %}
        tap_action:
          action: more-info
        color: >
          {% set ch = states('sensor.grid_to_battery')|float(0) +
          states('sensor.solar_to_battery')|float(0) %} {% set dis =
          states('sensor.battery_to_house')|float(0) +
          states('sensor.battery_to_grid')|float(0) %} {% if ch > dis %} green
          {% elif dis > ch %} orange {% else %} grey {% endif %}
        vertical: true
        features_position: bottom
      - type: custom:mushroom-chips-card
        chips:
          - type: entity
            entity: sensor.solar_power
            name: Solar
            icon: mdi:weather-sunny
          - type: entity
            entity: sensor.house_power
            name: House
            icon: mdi:home-lightning-bolt
          - type: entity
            entity: sensor.grid_power
            name: Grid
            icon: mdi:transmission-tower
          - type: entity
            entity: sensor.battery_state_of_charge
            name: SoC
            icon: mdi:battery
          - type: entity
            entity: sensor.spot_price
            name: Spot
            icon: mdi:currency-eur
  - type: custom:plotly-graph
    title: Battery Usage
    view_layout:
      grid-column: span 2
    hours_to_show: 6
    refresh_interval: 30
    defaults:
      entity:
        period: 5minute
    layout:
      height: 420
      barmode: relative
      bargap: 0.15
      paper_bgcolor: rgba(0,0,0,0)
      plot_bgcolor: rgba(0,0,0,0)
      margin:
        l: 50
        r: 55
        t: 40
        b: 45
      xaxis:
        showgrid: true
        zeroline: false
      yaxis:
        title: kW
        showgrid: true
        zeroline: true
        zerolinewidth: 2
      yaxis2:
        title: Spot
        overlaying: "y"
        side: right
        showgrid: false
      legend:
        orientation: h
        "y": -0.55
        x: 0.15
    entities:
      - entity: sensor.grid_to_battery
        name: Grid → Battery
        type: bar
        marker:
          color: rgba(255,152,0,0.95)
      - entity: sensor.solar_to_battery
        name: Solar → Battery
        type: bar
        marker:
          color: rgba(253,216,53,0.95)
      - entity: sensor.battery_to_house
        name: Battery → House
        type: bar
        filters:
          - multiply: -1
        marker:
          color: rgba(76,175,80,0.95)
      - entity: sensor.battery_to_grid
        name: Battery → Grid
        type: bar
        filters:
          - multiply: -1
        marker:
          color: rgba(33,150,243,0.95)
      - entity: sensor.spot_price
        name: Spot price
        type: scatter
        mode: lines
        period: 5minute
        yaxis: y2
        line:
          width: 2
  - type: custom:plotly-graph
    title: Solar Production
    hours_to_show: 6
    refresh_interval: 30
    defaults:
      entity:
        period: 5minute
    layout:
      height: 340
      barmode: relative
      bargap: 0.15
      paper_bgcolor: rgba(0,0,0,0)
      plot_bgcolor: rgba(0,0,0,0)
      margin:
        l: 50
        r: 30
        t: 40
        b: 45
      xaxis:
        showgrid: true
      yaxis:
        title: kW
        showgrid: true
        zeroline: true
        zerolinewidth: 2
      legend:
        orientation: h
        "y": -0.55
    entities:
      - entity: sensor.solar_to_house
        name: Solar → House
        type: bar
        marker:
          color: rgba(255,193,7,0.95)
      - entity: sensor.solar_to_battery
        name: Solar → Battery
        type: bar
        marker:
          color: rgba(0,188,212,0.95)
      - entity: sensor.solar_to_grid
        name: Solar → Grid
        type: bar
        marker:
          color: rgba(156,39,176,0.95)
  - type: custom:plotly-graph
    title: Energy Split — Last 48h
    raw_plotly_config: true
    hours_to_show: 48
    refresh_interval: 300
    config:
      displayModeBar: false
    defaults:
      entity:
        period: 5minute
    entities:
      - entity: sensor.battery_to_house
        internal: true
        fn: |
          $ex {
            const integrateKwh = (xs, ys) => {
              const hours = Number(meta?.hours_to_show ?? 48);
              const end = Date.now();
              const start = end - hours * 3600 * 1000;
              const pts = (xs || [])
                .map((x, i) => [new Date(x).getTime(), Number(ys?.[i])])
                .filter(([t, v]) => Number.isFinite(t) && Number.isFinite(v))
                .sort((a, b) => a[0] - b[0]);

              if (!pts.length) return 0;

              let total = 0;
              let prevT = start;
              let prevV = 0;

              for (const [t, v] of pts) {
                if (t < start) {
                  prevT = start;
                  prevV = v;
                  continue;
                }
                const dtH = (Math.min(t, end) - prevT) / 3600000;
                if (dtH > 0) total += prevV * dtH;
                prevT = t;
                prevV = v;
                if (t > end) break;
              }

              if (prevT < end) {
                total += prevV * ((end - prevT) / 3600000);
              }
              return Math.max(0, total);
            };

            vars.energy_split = vars.energy_split || {};
            vars.energy_split.battery_to_house = integrateKwh(xs, ys);
          }
