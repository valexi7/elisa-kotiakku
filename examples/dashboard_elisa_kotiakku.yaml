          $ex (() => {
            const base = vars.hm?.text ?? [['']];
            const charge = vars.charge ?? [];
            const discharge = vars.discharge ?? [];

            return base.map((row, r) =>
              row.map((cell, c) => {
                const tags = [];
                if (charge?.[r]?.[c] === 1) tags.push('🟣 Charging');
                if (discharge?.[r]?.[c] === 1) tags.push('🔵 Discharging');
                return tags.length ? `${cell}<br><b>${tags.join('<br>')}</b>` : cell;
              })
            );
          })()
        hovertemplate: "%{text}<extra></extra>"
